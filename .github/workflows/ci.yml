name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests (unit + integration + e2e, excluding live)
        run: npm run test:e2e

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
          retention-days: 7

  build:
    name: Build artifact
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify binary starts
        run: |
          timeout 2 node dist/index.js 2>&1 || true

      - name: Smoke test (tools/list via stdin)
        run: |
          node -e "
            const { spawn } = require('node:child_process');
            const child = spawn('node', ['dist/index.js'], {
              env: {
                ...process.env,
                HORTUSFOX_BASE_URL: 'http://127.0.0.1:9',
                HORTUSFOX_API_TOKEN: 'ci-smoke-test-token-not-real',
              },
              stdio: ['pipe', 'pipe', 'inherit'],
            });
            let buf = '';
            child.stdout.on('data', (d) => {
              buf += d.toString();
              const lines = buf.split('\n');
              buf = lines.pop();
              for (const line of lines) {
                if (!line.trim()) continue;
                try {
                  const msg = JSON.parse(line);
                  if (msg.result?.tools) {
                    console.log('Smoke: ' + msg.result.tools.length + ' tools registered');
                    if (msg.result.tools.length < 30) process.exit(1);
                    child.kill();
                    process.exit(0);
                  }
                } catch {}
              }
            });
            child.stdin.write(JSON.stringify({jsonrpc:'2.0',id:1,method:'initialize',params:{protocolVersion:'2024-11-05',capabilities:{},clientInfo:{name:'smoke',version:'0.0.1'}}}) + '\n');
            setTimeout(() => {
              child.stdin.write(JSON.stringify({jsonrpc:'2.0',method:'notifications/initialized'}) + '\n');
              child.stdin.write(JSON.stringify({jsonrpc:'2.0',id:2,method:'tools/list'}) + '\n');
            }, 300);
            setTimeout(() => { console.error('Smoke timeout'); process.exit(1); }, 5000);
          "
