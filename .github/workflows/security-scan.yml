name: Security scan

# Runs security scanners:
#   - gitleaks : secrets in source
#   - npm audit: dependency vulnerabilities
#   - Trivy fs : multi-language CVEs (npm lockfile)
#
# Separate from ci.yml so a CVE landing overnight fires a single
# notification on the security-scan run, not a "tests broke" alert.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan for secrets
        run: gitleaks detect --redact --no-git -c .gitleaks.toml --no-banner -v

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps — blocks on high+)
        run: npm audit --omit=dev --audit-level=high

      - name: npm audit (dev deps — informational only)
        run: npm audit --audit-level=critical || true

  trivy:
    name: Trivy (CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: node_modules,dist,coverage
